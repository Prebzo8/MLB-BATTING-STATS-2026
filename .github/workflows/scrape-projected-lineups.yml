name: Projected Lineups Scrape

on:
  schedule:
    - cron: '0 14 * * *'   # 9:00 AM ET — after lineups start posting
    - cron: '0 17 * * *'   # 12:00 PM ET — midday refresh
    - cron: '0 20 * * *'   # 3:00 PM ET  — afternoon refresh
    - cron: '0 22 * * *'   # 5:00 PM ET  — pre-game refresh
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Scrape Projected Lineups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape_projected_lineups.py

      - name: Telegram — success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ Projected lineups scraped from RotoGrinders successfully"

      - name: Telegram — failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Projected lineups scrape FAILED. Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
